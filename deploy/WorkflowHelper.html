<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSCP Notepad</title>
<link rel="stylesheet" href="vendor/github-markdown-dark.css">
<link rel="stylesheet" href="vendor/highlight-github-dark.min.css">
<script src="vendor/marked.min.js"></script>
<script src="vendor/highlight.min.js"></script>
<style>
:root {
  --bg0: #0d1117;
  --bg1: #161b22;
  --bg2: #21262d;
  --bd:  #30363d;
  --tx:  #e6edf3;
  --tx2: #7d8590;
  --ac:  #3fb950;
  --danger: #da3633;
  --warn: #e3b341;
  --mono: 'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg0); color: var(--tx); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

/* ── App shell ────────────────────────────────── */
.app { display: flex; flex: 1 1 auto; min-height: 0; }
.panel { display: flex; flex-direction: column; border-right: 1px solid var(--bd); min-width: 0; }
.panel:last-child { border-right: none; }
.panel-hd {
  display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 12px;
  background: var(--bg2); border-bottom: 1px solid var(--bd); flex-shrink: 0;
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--tx2);
}
.hd-space { flex: 1; }

/* ── Variables panel ──────────────────────────── */
.vars-panel { width: 248px; flex-shrink: 0; background: var(--bg1); }
.vars-list { flex: 1; overflow-y: auto; min-height: 0; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
.var-row { display: flex; align-items: center; gap: 4px; }
.var-row input {
  flex: 1; background: var(--bg0); border: 1px solid var(--bd); border-radius: 5px;
  color: var(--tx); font-family: var(--mono); font-size: 11px; padding: 5px 7px;
  outline: none; min-width: 0; transition: border-color 0.12s;
}
.var-row input:focus { border-color: var(--ac); }
.var-row .var-key { flex: 0.9; font-weight: 600; color: var(--ac); }
.var-row .del-btn {
  flex-shrink: 0; background: none; border: none; color: var(--tx2);
  cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 5px; border-radius: 4px;
}
.var-row .del-btn:hover { color: var(--danger); background: rgba(218,54,51,0.12); }
.vars-footer { padding: 8px; flex-shrink: 0; border-top: 1px solid var(--bd); }
.add-var-btn {
  width: 100%; padding: 6px 10px; background: none;
  border: 1px dashed var(--bd); border-radius: 5px;
  color: var(--tx2); font-size: 12px; cursor: pointer; transition: all 0.12s;
}
.add-var-btn:hover { border-color: var(--ac); color: var(--ac); background: rgba(63,185,80,0.05); }

/* ── Editor panel ─────────────────────────────── */
.editor-panel { flex: 2; background: var(--bg0); }
.editor-panel textarea {
  flex: 1; min-height: 0; width: 100%; resize: none; outline: none; border: none;
  background: var(--bg0); color: var(--tx); font-family: var(--mono);
  font-size: 13px; line-height: 1.65; padding: 16px 20px; tab-size: 2;
}
.editor-panel textarea::placeholder { color: var(--tx2); opacity: 0.7; }

/* ── Collapsible editor ───────────────────────── */
.editor-panel { position: relative; transition: flex-grow 0.15s ease, flex-basis 0.15s ease; }
.collapse-btn { font-size: 15px; line-height: 1; padding: 1px 8px 3px; }
.ed-rail { display: none; }
.editor-panel.collapsed { flex: 0 0 34px; min-width: 34px; }
.editor-panel.collapsed textarea { display: none; }
.editor-panel.collapsed .ed-title,
.editor-panel.collapsed .ed-tool,
.editor-panel.collapsed .hd-space { display: none; }
.editor-panel.collapsed .panel-hd { padding: 0; justify-content: center; }
.editor-panel.collapsed .collapse-btn { transform: rotate(180deg); }
.editor-panel.collapsed .ed-rail {
  display: flex; align-items: center; justify-content: center; flex: 1; min-height: 0;
  writing-mode: vertical-rl; text-orientation: mixed; cursor: pointer; user-select: none;
  color: var(--tx2); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
}
.editor-panel.collapsed .ed-rail:hover { color: var(--ac); }

/* ── Preview panel ────────────────────────────── */
.preview-panel { flex: 3; background: var(--bg0); }
.preview-scroll { flex: 1; overflow-y: auto; min-height: 0; }
.preview-body { padding: 28px 36px; }

/* github-markdown-css overrides */
.markdown-body { background: transparent !important; color: var(--tx) !important; font-size: 14px !important; }
.markdown-body h1, .markdown-body h2 { border-bottom-color: var(--bd) !important; }
.markdown-body a { color: #58a6ff; }
.markdown-body blockquote { border-left-color: var(--bd); color: var(--tx2); }
.markdown-body hr { border-color: var(--bd); }
.markdown-body table tr { border-top-color: var(--bd); background: transparent; }
.markdown-body table tr:nth-child(2n) { background: rgba(255,255,255,0.03); }
.markdown-body table th, .markdown-body table td { border-color: var(--bd); }
/* Hand off pre/code entirely to our custom blocks */
.markdown-body pre { background: transparent !important; padding: 0 !important; margin: 0 !important; border-radius: 0 !important; border: none !important; }
.markdown-body pre code { background: transparent !important; }
/* Inline code */
.markdown-body code:not(.hljs) { background: rgba(110,118,129,0.15) !important; border-radius: 4px; padding: 0.2em 0.45em; font-family: var(--mono); font-size: 0.9em; color: var(--tx); }

/* ── Custom code blocks ───────────────────────── */
.code-block {
  background: #0d1117; border: 1px solid var(--bd); border-radius: 8px;
  overflow: hidden; margin: 14px 0;
}
.code-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px; background: var(--bg2); border-bottom: 1px solid var(--bd);
}
.lang-tag { font-family: var(--mono); font-size: 11px; color: var(--tx2); }
.copy-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: 1px solid var(--bd); border-radius: 4px;
  color: var(--tx2); cursor: pointer; font-size: 11px; font-family: var(--mono);
  padding: 3px 9px; transition: all 0.12s; white-space: nowrap;
}
.copy-btn:hover { border-color: var(--ac); color: var(--ac); }
.copy-btn.copied { border-color: var(--ac); color: var(--ac); background: rgba(63,185,80,0.08); }
.code-block pre { margin: 0 !important; padding: 14px 16px !important; overflow-x: auto; }
.code-block pre code { font-size: 13px !important; font-family: var(--mono) !important; background: transparent !important; }

/* ── Unfilled placeholder highlight ──────────── */
.unfilled {
  background: rgba(227,179,65,0.15); color: var(--warn);
  border: 1px solid rgba(227,179,65,0.3); border-radius: 3px;
  padding: 0.05em 0.3em; font-family: var(--mono); font-size: 0.88em;
}

/* ── Header buttons ───────────────────────────── */
.hd-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: none; border: 1px solid var(--bd); border-radius: 4px;
  color: var(--tx2); cursor: pointer; font-size: 11px; padding: 3px 9px;
  transition: all 0.12s; white-space: nowrap; text-decoration: none;
}
.hd-btn:hover { border-color: var(--tx2); color: var(--tx); }

/* ── Status chips ─────────────────────────────── */
.status { font-size: 11px; color: var(--tx2); font-family: var(--mono); }
.status.ok   { color: var(--ac); }
.status.warn { color: var(--warn); }

/* ── Scrollbars ───────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--tx2); }

/* ── Top navigation bar ───────────────────────── */
body { display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; gap: 8px; height: 40px; flex-shrink: 0;
  padding: 0 12px; background: var(--bg1); border-bottom: 1px solid var(--bd);
}
.tb-space { flex: 1; }
.tb-title { font-size: 12px; font-weight: 600; color: var(--tx); min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tb-title .tb-sub { color: var(--tx2); font-weight: 500; }
.tb-pos { font-family: var(--mono); font-size: 11px; color: var(--tx2); flex-shrink: 0; }

/* ── README drawer ────────────────────────────── */
.readme-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(1,4,9,0.55);
  display: flex; justify-content: flex-end; }
.readme-overlay[hidden] { display: none; }
.readme-drawer { width: min(760px, 94vw); background: var(--bg0); border-left: 1px solid var(--bd);
  display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.45); }
.readme-hd { display: flex; align-items: center; height: 40px; padding: 0 14px;
  background: var(--bg2); border-bottom: 1px solid var(--bd); flex-shrink: 0;
  font-size: 12px; font-weight: 600; color: var(--tx); }
.readme-hd .hd-space { flex: 1; }
.readme-body { flex: 1; overflow-y: auto; min-height: 0; padding: 24px 30px; }
</style>
</head>
<body>

<!-- ─── Top navigation bar ─── -->
<div class="topbar">
  <a class="hd-btn" href="../index.html" title="Back to the topic menu">☰ Menu</a>
  <span class="tb-title" id="tb-title"></span>
  <span class="tb-space"></span>
  <span class="tb-pos" id="tb-pos"></span>
  <button class="hd-btn" id="prev-btn" onclick="cycle(-1)" title="Previous note (Alt+←)">‹ prev</button>
  <button class="hd-btn" id="next-btn" onclick="cycle(1)" title="Next note (Alt+→)">next ›</button>
  <button class="hd-btn" id="readme-btn" onclick="toggleReadme()" title="Show this topic's README (Esc closes)">📖 README</button>
</div>

<div class="app">

  <!-- ─── Variables panel ─── -->
  <aside class="panel vars-panel">
    <div class="panel-hd">
      <span>Variables</span>
      <span class="hd-space"></span>
      <span class="status" id="var-count"></span>
    </div>
    <div class="vars-list" id="vars-list"></div>
    <div class="vars-footer">
      <button class="add-var-btn" onclick="addVar()">+ add variable</button>
    </div>
  </aside>

  <!-- ─── Editor panel ─── -->
  <div class="panel editor-panel" id="editor-panel">
    <div class="panel-hd">
      <span class="ed-title">Markdown</span>
      <span class="hd-space"></span>
      <label class="hd-btn ed-tool" title="Load a .md file">
        ↑ import
        <input type="file" accept=".md,.txt,.text" style="display:none" onchange="importFile(this)">
      </label>
      <button class="hd-btn ed-tool" onclick="resetAll()">reset</button>
      <button class="hd-btn collapse-btn" onclick="toggleEditor()" title="Collapse / expand markdown panel">‹</button>
    </div>
    <textarea id="editor" spellcheck="false"
      placeholder="Paste your methodology markdown here.&#10;&#10;Use {{VAR_NAME}} placeholders, e.g.:&#10;  crackmapexec smb {{DC_IP}} -u {{USERNAME}} -p {{PASSWORD}}&#10;  secretsdump.py {{DOMAIN_UPPER}}/{{USERNAME}}@{{DC_IP}} -just-dc"></textarea>
    <div class="ed-rail" onclick="toggleEditor()" title="Expand markdown panel">Markdown</div>
  </div>

  <!-- ─── Preview panel ─── -->
  <div class="panel preview-panel">
    <div class="panel-hd">
      <span>Preview</span>
      <span class="hd-space"></span>
      <span class="status" id="preview-status"></span>
      <button class="hd-btn" onclick="exportMd()" title="Save filled markdown as .md file">↓ export</button>
    </div>
    <div class="preview-scroll">
      <div class="preview-body markdown-body" id="preview"></div>
    </div>
  </div>

</div>

<!-- ─── README drawer ─── -->
<div class="readme-overlay" id="readme-overlay" hidden>
  <div class="readme-drawer">
    <div class="readme-hd">
      <span id="readme-title">README</span>
      <span class="hd-space"></span>
      <button class="hd-btn" onclick="toggleReadme()" title="Close (Esc)">× close</button>
    </div>
    <div class="readme-body markdown-body" id="readme-body"></div>
  </div>
</div>

<script>
/* ─── Default content ─────────────────────────────── */
const DEFAULT_VARS = [
  { key: 'DC_IP',        value: '' },
  { key: 'TARGET_IP',    value: '' },
  { key: 'SUBNET',       value: '' },
  { key: 'NETWORK',      value: '' },
  { key: 'DOMAIN',       value: '' },
  { key: 'DOMAIN_UPPER', value: '' },
  { key: 'DOMAIN_NB',    value: '' },
  { key: 'USERNAME',     value: '' },
  { key: 'PASSWORD',     value: '' },
  { key: 'NTLM_HASH',    value: '' },
  { key: 'USERLIST',     value: '' },
  { key: 'HASHFILE',     value: '' },
  { key: 'NEXT_USER',    value: '' },
  { key: 'TARGET_USER',  value: '' },
  { key: 'SESSION_NAME', value: '' },
  { key: 'SPN',          value: '' },
  { key: 'SHARE_NAME',   value: '' },
  { key: 'GROUP_NAME',   value: '' },
  { key: 'COMPUTER_NAME', value: '' },
  { key: 'OUTPUT',       value: '' },
  { key: 'LHOST',        value: '' },
  { key: 'LPORT',        value: '' },
];

const DEFAULT_MD = `# AD Attack — {{DOMAIN}} ({{DC_IP}})

> Fill DC_IP, DOMAIN, DOMAIN_UPPER, DOMAIN_NB, USERNAME, PASSWORD in the panel.
> Then import any note from htbad/ to template it against this target.

## Phase 1 · Initial enumeration

\`\`\`bash
# DNS / SMB / LDAP surface
nmap -sV -sC -p53,88,135,139,389,445,464,636,3268,5985 {{DC_IP}}
\`\`\`

\`\`\`bash
# Null-session share + user hunt
crackmapexec smb {{DC_IP}} -u '' -p '' --shares --users
\`\`\`

## Phase 2 · Credentialed enumeration

\`\`\`bash
crackmapexec smb {{DC_IP}} -u {{USERNAME}} -p {{PASSWORD}} --users --groups --shares
\`\`\`

\`\`\`bash
sudo bloodhound-python -u '{{USERNAME}}' -p '{{PASSWORD}}' -ns {{DC_IP}} -d {{DOMAIN}} -c all
\`\`\`

## Phase 3 · Kerberoasting

\`\`\`bash
GetUserSPNs.py -dc-ip {{DC_IP}} {{DOMAIN_UPPER}}/{{USERNAME}}:{{PASSWORD}} -request
\`\`\`

## Phase 4 · Lateral movement

\`\`\`bash
# NetBIOS-style domain\\user
psexec.py {{DOMAIN}}/{{USERNAME}}:'{{PASSWORD}}'@{{DC_IP}}
evil-winrm -i {{DC_IP}} -u {{USERNAME}} -p '{{PASSWORD}}'
\`\`\`

\`\`\`powershell
runas /netonly /user:{{DOMAIN_NB}}\\{{USERNAME}} powershell
\`\`\`

## Phase 5 · Domain dominance (DCSync)

\`\`\`bash
secretsdump.py {{DOMAIN_UPPER}}/{{USERNAME}}:'{{PASSWORD}}'@{{DC_IP}} -just-dc
\`\`\`

## Credentials

| Host | User | Password / Hash | Notes |
|------|------|-----------------|-------|
| {{DC_IP}} | {{USERNAME}} | {{PASSWORD}} | |

## Flags

- [ ] user.txt
- [ ] root.txt / Administrator
`;

/* ─── State ───────────────────────────────────────── */
let vars = [];

/* ─── Topic navigation ────────────────────────────── */
/* Opened as WorkflowHelper.html?topic=<id>&file=<name.md>. With no params it
   falls back to the classic free-form scratchpad. Sibling notes + the README
   come from ../deploy/manifest.json so we can title, cycle, and pop the README. */
const VARS_KEY = 'oscp-vars';       // target-specific vars, shared across all notes
const SCRATCH_MD_KEY = 'oscp-md';   // free-form editor when no topic is selected
const MD_PREFIX = 'wf-md';          // per-note edited copies:  wf-md:<topic>/<file>

const params = new URLSearchParams(location.search);
const TOPIC = params.get('topic');
const FILE  = params.get('file');
let manifest = null, topicObj = null, fileIdx = -1, readmeLoaded = false;

function mdKey() {
  return (TOPIC && FILE) ? (MD_PREFIX + ':' + TOPIC + '/' + FILE) : SCRATCH_MD_KEY;
}

function saveState() {
  try {
    localStorage.setItem(VARS_KEY, JSON.stringify(vars));
    localStorage.setItem(mdKey(), el('editor').value);
  } catch(e) {}
}

function loadVars() {
  try {
    const sv = localStorage.getItem(VARS_KEY);
    vars = sv ? JSON.parse(sv) : DEFAULT_VARS.map(v => ({...v}));
  } catch(e) { vars = DEFAULT_VARS.map(v => ({...v})); }
}

async function loadFromDisk() {
  const dir = topicObj ? topicObj.dir : TOPIC;
  try {
    const res = await fetch('../' + dir + '/' + FILE, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    el('editor').value = await res.text();
  } catch(e) {
    el('editor').value = '# Could not load ' + FILE + '\n\n> ' + e +
      '\n\nServe the repo over HTTP (the systemd service) so notes can be fetched,\n' +
      'or open the note directly and paste it in.';
  }
  saveState();
}

async function boot() {
  loadVars();
  renderVars();

  // No topic selected → classic free-form scratchpad.
  if (!TOPIC || !FILE) {
    let sm = null;
    try { sm = localStorage.getItem(SCRATCH_MD_KEY); } catch(e) {}
    el('editor').value = (sm !== null) ? sm : DEFAULT_MD;
    setTopbar(null);
    render();
    return;
  }

  // Topic mode → load the manifest so we can title / cycle / pop the README.
  try {
    const res = await fetch('manifest.json', { cache: 'no-store' });
    manifest = await res.json();
    topicObj = manifest.topics.find(t => t.id === TOPIC) || null;
    if (topicObj) fileIdx = topicObj.files.findIndex(f => f.file === FILE);
  } catch(e) { topicObj = null; }

  // Prefer a previously edited copy of this exact note; else pull from disk.
  let saved = null;
  try { saved = localStorage.getItem(mdKey()); } catch(e) {}
  if (saved !== null) el('editor').value = saved;
  else await loadFromDisk();

  setTopbar(topicObj);
  render();
}

function setTopbar(t) {
  const prevB = el('prev-btn'), nextB = el('next-btn'), rmB = el('readme-btn');
  if (!t) {
    el('tb-title').textContent = 'Scratchpad';
    el('tb-pos').textContent = '';
    prevB.style.display = nextB.style.display = rmB.style.display = 'none';
    return;
  }
  const fileTitle = (fileIdx >= 0 && t.files[fileIdx]) ? t.files[fileIdx].title : FILE;
  el('tb-title').innerHTML = '<span class="tb-sub">' + esc(t.title) + '</span>&nbsp; · &nbsp;' + esc(fileTitle);
  const n = t.files.length;
  if (n > 1 && fileIdx >= 0) {
    el('tb-pos').textContent = (fileIdx + 1) + ' / ' + n;
    prevB.style.display = nextB.style.display = '';
  } else {
    el('tb-pos').textContent = '';
    prevB.style.display = nextB.style.display = 'none';
  }
  rmB.style.display = t.readme ? '' : 'none';
}

function cycle(dir) {
  if (!topicObj || topicObj.files.length < 2 || fileIdx < 0) return;
  const n = topicObj.files.length;
  const nf = topicObj.files[(fileIdx + dir + n) % n].file;
  location.search = '?topic=' + encodeURIComponent(TOPIC) + '&file=' + encodeURIComponent(nf);
}

async function toggleReadme() {
  const ov = el('readme-overlay');
  if (!ov.hidden) { ov.hidden = true; return; }
  if (!topicObj || !topicObj.readme) return;
  if (!readmeLoaded) {
    el('readme-title').textContent = topicObj.title + ' — ' + topicObj.readme;
    try {
      const res = await fetch('../' + topicObj.dir + '/' + topicObj.readme, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      el('readme-body').innerHTML = marked.parse(await res.text());
      fixRelativeAssets(el('readme-body'), '../' + topicObj.dir + '/');
    } catch(e) {
      el('readme-body').innerHTML = '<p>README could not be loaded (' + esc(String(e)) + ').</p>';
    }
    readmeLoaded = true;
  }
  ov.hidden = false;
}

/* ─── Variable management ─────────────────────────── */
function renderVars() {
  const list = el('vars-list');
  list.innerHTML = '';
  vars.forEach((v, i) => {
    const row = document.createElement('div');
    row.className = 'var-row';
    row.innerHTML =
      `<input class="var-key" type="text" value="${esc(v.key)}" placeholder="KEY"
        oninput="setKey(${i},this)" autocomplete="off" spellcheck="false">` +
      `<input class="var-val" type="text" value="${esc(v.value)}" placeholder="value"
        oninput="setVal(${i},this.value)" autocomplete="off" spellcheck="false">` +
      `<button class="del-btn" onclick="delVar(${i})" title="Remove">×</button>`;
    list.appendChild(row);
  });
  el('var-count').textContent = vars.length ? `${vars.length} var${vars.length > 1 ? 's' : ''}` : '';
}

function setKey(i, input) {
  const upper = input.value.replace(/[^A-Z0-9_]/gi, '_').toUpperCase();
  vars[i].key = upper;
  if (input.value !== upper) {
    const pos = input.selectionStart;
    input.value = upper;
    input.setSelectionRange(pos, pos);
  }
  saveState(); render();
}

function setVal(i, v) { vars[i].value = v; saveState(); render(); }

function delVar(i) { vars.splice(i, 1); renderVars(); saveState(); render(); }

function addVar() {
  vars.push({ key: '', value: '' });
  renderVars();
  const rows = el('vars-list').querySelectorAll('.var-row');
  if (rows.length) rows[rows.length - 1].querySelector('.var-key').focus();
}

/* ─── Marked setup ────────────────────────────────── */
marked.use({
  gfm: true,
  renderer: {
    code(codeOrToken, infostring) {
      // marked <12 calls this positionally: code(codeString, infostring).
      // marked >=12 passes a single token object: { text, lang }.
      let text, lang;
      if (codeOrToken && typeof codeOrToken === 'object') {
        text = codeOrToken.text; lang = codeOrToken.lang;
      } else {
        text = codeOrToken; lang = infostring;
      }
      text = text || '';
      lang = (lang || '').match(/\S*/)[0];  // infostring may carry extra words
      const language = (lang && hljs.getLanguage(lang)) ? lang : 'plaintext';
      let highlighted;
      try { highlighted = hljs.highlight(text, { language }).value; }
      catch(e) { highlighted = esc(text); }
      return (
        `<div class="code-block">` +
          `<div class="code-hd">` +
            `<span class="lang-tag">${esc(lang || 'text')}</span>` +
            `<button class="copy-btn" onclick="copyBlock(this)">` +
              `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">` +
                `<rect x="9" y="9" width="13" height="13" rx="2"/>` +
                `<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>` +
              `</svg>` +
              `<span>copy</span>` +
            `</button>` +
          `</div>` +
          `<pre><code class="hljs language-${language}">${highlighted}</code></pre>` +
        `</div>`
      );
    }
  }
});

/* ─── Render ──────────────────────────────────────── */
function getVarsMap() {
  const m = {};
  vars.forEach(({ key, value }) => { if (key) m[key] = value; });
  return m;
}

function fillPlaceholders(text) {
  const m = getVarsMap();
  return text.replace(/\{\{([A-Z0-9_]+)\}\}/g, (match, key) =>
    (key in m && m[key] !== '') ? m[key] : match
  );
}

/* Folder a note's relative images/links resolve against, from this page in deploy/. */
function assetBase() {
  const dir = topicObj ? topicObj.dir : TOPIC;
  return dir ? ('../' + dir + '/') : '';
}

/* Rewrite relative <img>/<a> targets so notes served from deploy/ still find
   images that live next to the markdown (e.g. active/ad-attack-journey-map.png).
   Absolute URLs, data: URIs, root paths and #anchors are left untouched. */
function fixRelativeAssets(container, base) {
  if (!base) return;
  const isRel = v => v && !/^([a-z][a-z0-9+.-]*:|\/\/|\/|#)/i.test(v);
  container.querySelectorAll('img[src]').forEach(img => {
    const s = img.getAttribute('src');
    if (isRel(s)) img.setAttribute('src', base + s);
  });
  container.querySelectorAll('a[href]').forEach(a => {
    const h = a.getAttribute('href');
    if (isRel(h)) a.setAttribute('href', base + h);
  });
}

function render() {
  const raw = el('editor').value;
  const filled = fillPlaceholders(raw);

  let html;
  try { html = marked.parse(filled); }
  catch(e) { html = `<pre>${esc(raw)}</pre>`; }

  // Highlight any remaining unfilled {{VARS}} (works well outside code blocks;
  // inside hljs-highlighted blocks braces may be split — acceptable limitation)
  html = html.replace(/\{\{([A-Z0-9_]+)\}\}/g,
    (_, k) => `<span class="unfilled" title="{{${k}}} is not set">{{${k}}}</span>`);

  el('preview').innerHTML = html;
  fixRelativeAssets(el('preview'), assetBase());

  // Status indicator
  const remaining = (filled.match(/\{\{[A-Z0-9_]+\}\}/g) || []);
  const ps = el('preview-status');
  if (remaining.length) {
    const uniq = [...new Set(remaining)];
    ps.textContent = `${uniq.length} unfilled`;
    ps.className = 'status warn';
  } else if (raw.trim()) {
    ps.textContent = 'all filled ✓';
    ps.className = 'status ok';
  } else {
    ps.textContent = '';
    ps.className = 'status';
  }
}

/* ─── Copy ────────────────────────────────────────── */
function copyBlock(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  // innerText preserves line breaks correctly in code blocks
  const text = (code.innerText || code.textContent || '').replace(/\n$/, '');
  const label = btn.querySelector('span');
  doClipboard(text, label);
}

function doClipboard(text, labelEl) {
  const write = () => {
    if (navigator && navigator.clipboard) return navigator.clipboard.writeText(text);
    // Fallback for file:// protocol or older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    Object.assign(ta.style, { position: 'fixed', opacity: '0', top: '0', left: '0', width: '1px', height: '1px' });
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    return Promise.resolve();
  };

  write().then(() => {
    const prev = labelEl.textContent;
    labelEl.textContent = 'copied!';
    labelEl.closest('.copy-btn').classList.add('copied');
    setTimeout(() => {
      labelEl.textContent = prev;
      labelEl.closest('.copy-btn').classList.remove('copied');
    }, 1500);
  }).catch(err => console.error('Copy failed:', err));
}

/* ─── Import / Export ─────────────────────────────── */
function importFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    el('editor').value = e.target.result;
    saveState(); render();
  };
  reader.readAsText(file);
  input.value = '';
}

function exportMd() {
  const raw = el('editor').value;
  const filled = fillPlaceholders(raw);
  const blob = new Blob([filled], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ip = (vars.find(v => v.key === 'TARGET_IP') || {}).value;
  a.download = (ip ? ip : 'notes') + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (TOPIC && FILE) {
    if (confirm('Reload this note from disk and discard your edits to it?\n(Your variables are kept.)')) {
      loadFromDisk().then(render);
    }
  } else if (confirm('Reset the scratchpad to the default template?')) {
    el('editor').value = DEFAULT_MD; saveState(); render();
  }
}

/* ─── Collapse / expand the markdown panel ────────── */
function toggleEditor() {
  const collapsed = el('editor-panel').classList.toggle('collapsed');
  try { localStorage.setItem('oscp-ed-collapsed', collapsed ? '1' : '0'); } catch(e) {}
}

/* ─── Utils ───────────────────────────────────────── */
const el = id => document.getElementById(id);
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ─── Init ────────────────────────────────────────── */
boot();

try {
  // Markdown pane is collapsed by default; only an explicit expand ('0') keeps it open.
  if (localStorage.getItem('oscp-ed-collapsed') !== '0') el('editor-panel').classList.add('collapsed');
} catch(e) { el('editor-panel').classList.add('collapsed'); }

el('editor').addEventListener('input', () => { saveState(); render(); });
el('editor').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const t = e.target;
    const s = t.selectionStart;
    t.value = t.value.substring(0, s) + '  ' + t.value.substring(t.selectionEnd);
    t.selectionStart = t.selectionEnd = s + 2;
  }
});

/* ─── Navigation shortcuts + README close ─────────── */
el('readme-overlay').addEventListener('click', e => {
  if (e.target === el('readme-overlay')) el('readme-overlay').hidden = true;
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { el('readme-overlay').hidden = true; return; }
  if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); cycle(1); }
  else if (e.altKey && e.key === 'ArrowLeft') { e.preventDefault(); cycle(-1); }
});
</script>
</body>
